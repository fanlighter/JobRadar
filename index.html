<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JobRadar — бот с заказами</title>

<style>

body{
    margin:0;
    background:#e9e9e9;
    font-family:Arial, sans-serif;
}

.page{
    display:flex;
    justify-content:center;
    padding:20px 20px;
}

.card{

    width:560px;

    background:white;

    border-radius:12px;

    box-shadow:
    0 10px 30px rgba(0,0,0,0.15);

    overflow:hidden;
}

.banner img{
    width:100%;
    display:block;
}

.content{
    padding:40px 42px 42px;
    text-align:center;
}

.title{
    font-size:19px;
    font-weight:700;
    margin-bottom:22px;
}

.item{
    font-size:15px;
    color:#555;
    margin:12px 0;
}

.button{

    display:inline-flex;
    align-items:center;
    gap:8px;

    margin-top:26px;

    padding:12px 20px;

    background:#2AABEE;
    color:white;

    border-radius:7px;

    text-decoration:none;

    font-size:15px;
    font-weight:600;
}

.button img{
    width:18px;
}

.footer{
    text-align:center;
    padding:14px;
    font-size:12px;
    color:#aaa;
}

</style>

<script>

const TG_LINK = "https://t.me/offers_freelance_bot?start=landing";

function goToTelegram() {

    // здесь потом можно добавить метрику
    // ym(XXXXXX,'reachGoal','telegram_click');

    window.open(TG_LINK, "_blank");

}

</script>

</head>

<body>

<div class="page">

<div class="card">

<div class="banner" onclick="goToTelegram()" style="cursor:pointer;">
<img src="banner.png">
</div>

<div class="content">

<div class="title">
Лови лучшие фриланс-заказы раньше всех — прямо в Telegram
</div>

<div class="item">
💰 Зарабатывай на фрилансе, не тратя часы на мониторинг сайтов
</div>

<div class="item">
⚡ Бот сам отслеживает новые проекты и мгновенно присылает их тебе
</div>

<div class="item">
🎯 Получай только подходящие заказы без лишнего шума
</div>

<a class="button" onclick="goToTelegram()">

<img src="telegram.svg">

Получать заказы

</a>

</div>

<div class="footer">
JobRadar
</div>

</div>

</div>

</body>
</html>
