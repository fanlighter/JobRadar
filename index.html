<style>

body{
    margin:0;
    background:#e9e9e9;
    font-family:Arial, sans-serif;

.page{
    display:flex;
    justify-content:center;
    padding:20px 20px;
}

.card{

    width:560px;

    background:white;

    border-radius:12px;

    box-shadow:

    overflow:hidden;

.banner img{
    width:100%;
    display:block;
}

.content{
    padding:40px 42px 42px;

}

    font-size:19px;
    font-weight:700;
    margin-bottom:22px;
}

.item{
    font-size:15px;
    color:#555;
    margin:12px 0;
}

.button{

    display:inline-flex;
    align-items:center;
    gap:8px;

    margin-top:26px;

    padding:12px 20px;

    background:#2AABEE;
    color:white;

    border-radius:7px;

    text-decoration:none;

    font-size:15px;
    font-weight:600;

    cursor:pointer;
}

    width:18px;
}

.footer{
    text-align:center;
    padding:14px;
    font-size:12px;
    color:#aaa;
}

<script>


function getUTM(name) {

    const params = new URLSearchParams(window.location.search);
    return params.get(name) || "none";

}

function goToTelegram() {

    ym(107711503, 'getClientID', function(clientID) {

        ym(107711503, 'reachGoal', 'telegram_click');

        const utm_source = getUTM("utm_source");
        const utm_campaign = getUTM("utm_campaign");
        const utm_content = getUTM("utm_content");

        const payload =
            clientID + "__" +
            utm_source + "__" +
            utm_campaign + "__" +
            utm_content;

        const tg_link =
            "https://t.me/offers_freelance_bot?start=" + payload;

        window.open(tg_link, "_blank");

    });

}

</script>
